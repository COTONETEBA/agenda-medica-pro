<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gestor de Consultas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 30px;
    }

    h1 {
      text-align: center;
    }

    form {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      max-width: 500px;
      margin: 0 auto 30px auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #25D366;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1ebe5d;
    }

    .resultado {
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    .link-btn {
      display: inline-block;
      margin-top: 5px;
      padding: 8px 12px;
      background: #128C7E;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 14px;
    }

    .link-btn:hover {
      background: #0d6f63;
    }
  </style>
</head>
<body>

  <h1>Gestor de Consultas</h1>

  <form id="formConsulta">
    <input type="text" id="nome" placeholder="Nome do Cliente" required>
    <textarea id="mensagem" placeholder="Mensagem" required></textarea>
    <input type="text" id="numeros" placeholder="Números separados por vírgula" required>
    <button type="submit">Gerar Links</button>
  </form>

  <div class="resultado" id="resultado"></div>

  <script>
    function gerarLinkWhatsApp(numero, mensagem) {
      const texto = encodeURIComponent(mensagem);
      return `https://wa.me/${numero}?text=${texto}`;
    }

    document.getElementById("formConsulta").addEventListener("submit", function(e) {
      e.preventDefault();

      const nome = document.getElementById("nome").value;
      const mensagem = document.getElementById("mensagem").value;
      const numeros = document.getElementById("numeros").value;

      // 🔥 NOVO DIRECIONAMENTO - REMOVE ESPAÇOS
      const lista = numeros.split(",").map(n => n.trim());

      const container = document.getElementById("resultado");
      container.innerHTML = "";

      lista.forEach((numero, index) => {
        if (numero) {
          const link = gerarLinkWhatsApp(numero, mensagem);

          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <strong>Cliente:</strong> ${nome}<br>
            <strong>Número ${index + 1}:</strong> ${numero}<br>
            <a href="${link}" target="_blank" class="link-btn">
              Enviar WhatsApp
            </a>
          `;

          container.appendChild(card);
        }
      });
    });
  </script>

</body>
</html>
